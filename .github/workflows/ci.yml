# Official package mirror CI — required for every li-langverse package repo.
# Copied by: ./scripts/li-new-package --official  and  ./scripts/ensure-package-ci.sh
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Checkout lic sibling (../lic for li.toml path deps)
        run: |
          set -euo pipefail
          ref="${{ github.event.pull_request.head.ref }}"
          if [[ -z "$ref" || "$ref" == "null" ]]; then ref=main; fi
          lic_ref="$ref"
          if [[ "$ref" == "cursor/world-studio-gui-demo-recorder" ]]; then
            lic_ref="cursor/world-studio-gui-demo-recorder-phase2"
          fi
          git clone --depth 1 --branch "$lic_ref" https://github.com/li-langverse/lic.git ../lic \
            || git clone --depth 1 https://github.com/li-langverse/lic.git ../lic
          test -d ../lic/packages/li-ui

      - name: Enforce def syntax (no bare proc)
        run: |
          set -euo pipefail
          chmod +x ../lic/scripts/check-li-def-syntax.sh
          # Package tree only — lic checkout includes compile_fail proc tests.
          ../lic/scripts/check-li-def-syntax.sh src
          if [[ -d li-tests ]]; then
            ../lic/scripts/check-li-def-syntax.sh li-tests
          fi

      - name: Install LLVM 22
        run: |
          chmod +x ../lic/scripts/ci-install-llvm.sh
          sudo LI_LLVM_MAJOR=22 bash ../lic/scripts/ci-install-llvm.sh

      - name: Build lic
        working-directory: ../lic
        env:
          LLVM_DIR: /usr/lib/llvm-22/lib/cmake/llvm
          CC: clang-22
          CXX: clang++-22
        run: |
          chmod +x scripts/build.sh scripts/resolve-lic.sh 2>/dev/null || chmod +x scripts/build.sh
          ./scripts/build.sh

      - name: Sync studio tree into lic workspace (import_name resolution)
        run: |
          set -euo pipefail
          PKG=../lic/packages/li-studio
          rsync -a --delete src/ "$PKG/src/"
          if [[ -d li-tests ]]; then
            mkdir -p "$PKG/li-tests"
            rsync -a li-tests/ "$PKG/li-tests/"
          fi

      - name: lic check + smoke
        working-directory: ../lic
        env:
          LIC: ${{ github.workspace }}/../lic/build/compiler/lic/lic
        run: |
          set -euo pipefail
          test -x "$LIC"
          "$LIC" check packages/li-studio/src/lib.li
          if [[ -f packages/li-studio/li-tests/smoke/builds.li ]]; then
            "$LIC" build packages/li-studio/li-tests/smoke/builds.li -o /dev/null
          fi
