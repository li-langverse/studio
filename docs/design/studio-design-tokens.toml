# Approved Studio design tokens (native li-ui + demo HTML).
# Generator output: docs/design/studio-design-system.generated.md
# Do not auto-overwrite this file — merge generator suggestions manually.

[meta]
name = "li-world-studio"
version = 1
style = "hud-sci-fi-ai-native"

[color]
bg_primary = "#0d1117"
bg_elevated = "#161b22"
border = "#30363d"
text_primary = "#e6edf3"
text_muted = "#8b949e"
accent_cyan = "#3dd6ff"      # li-ui LI_CYAN family
accent_violet = "#7c5cff"
accent_mint = "#2ee6a8"
accent_amber = "#ffb347"
accent_rose = "#ff5c7a"
agent_running = "#238636"
agent_idle = "#8b949e"
agent_error = "#da3633"
focus_ring = "#3dd6ff"
viewport_grid = "#21262d"

[spacing]
dock_width_px = 56
outliner_width_px = 200
topbar_height_px = 44
inspector_width_px = 320

[motion]
panel_transition_ms = 100
hover_transition_ms = 200

[animation]
easing_default = "ease_out_cubic"
reduced_motion_scale = 0.0

[typography]
ui = "Inter, system-ui, sans-serif"
mono = "ui-monospace, monospace"
dock_label_px = 9
caption_px = 11
body_px = 12
heading_px = 14

[radius]
sm_px = 4
md_px = 6
lg_px = 8
pill_px = 999

[fx]
opacity_disabled = 0.38
opacity_scrim = 0.55
opacity_hover_delta = 0.08
blur_sigma_px = 3.0
blur_radius_px = 6.0
blur_passes = 2

[elevation]
shadow_r = 0.0
shadow_g = 0.0
shadow_b = 0.0
shadow_alpha_base = 0.32
shadow_layer_count = 3
shadow_offset_base_px = 2.0
shadow_spread_px = 6.0
shadow_alpha_falloff = 0.45
elevated_extra_layers = 1

[viewport]
hud_chip_height_px = 14
menu_chip_inset_px = 4
tier_chip_width_px = 120
biomol_chip_width_px = 88

[density]
dock_slot_size_px = 32
dock_slot_gap_px = 4
dock_padding_px = 8
dock_icon_inset_px = 4
topbar_tool_size_px = 28
topbar_tool_gap_px = 4
timeline_play_icon_inset_px = 6

[icons]
dock_scene = "dock_scene"
dock_assets = "dock_assets"
dock_sim = "dock_sim"
dock_timeline = "dock_timeline"
dock_settings = "dock_settings"

[semantic]
mock_banner = "MARKETING MOCK — HTML preview only; native Li Studio uses li-ui/li-gui"
command_palette_hint = "⌘K Command palette"

[ph_ux]
viewport_fps_target = 60
panel_switch_ms_max = 100
studio_load_ms_max = 2000
