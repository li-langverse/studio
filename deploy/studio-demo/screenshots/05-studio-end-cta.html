<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Li World Studio — end CTA (marketing mock)</title>
  <link rel="stylesheet" href="studio-tokens.css" />
  <style>
    body { width: 1920px; height: 1080px; margin: 0; background: radial-gradient(ellipse at 50% 38%, #1a2840, var(--color-bg-primary) 62%); color: var(--color-text-primary); font-family: var(--typography-ui); }
    .mock-banner { position: absolute; top: 0; left: 0; right: 0; background: #3d1f00; color: #ffdf9e; font-size: 11px; text-align: center; padding: 4px; }
    .cta-card { position: absolute; inset: 80px 240px 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border: 1px solid var(--color-border); border-radius: 20px; background: rgba(22,27,34,.92); }
    .logo-mark { width: 96px; height: 96px; border-radius: 20px; border: 2px solid var(--color-accent-cyan); display: flex; align-items: center; justify-content: center; font-size: 42px; font-weight: 700; color: var(--color-accent-cyan); margin-bottom: 28px; }
    h1 { margin: 0 0 12px; font-size: 48px; }
    .tagline { margin: 0 0 32px; font-size: 20px; color: var(--color-text-muted); max-width: 640px; }
    .url-placeholder { font-family: var(--typography-mono); font-size: 22px; padding: 14px 28px; border-radius: 999px; border: 1px dashed var(--color-accent-violet); color: var(--color-accent-violet); }
  </style>
</head>
<body>
  <div class="mock-banner">MARKETING MOCK — end CTA (studio-ux-18)</div>
  <section class="cta-card" aria-label="End call to action">
    <div class="logo-mark">Li</div>
    <h1>Li World Studio</h1>
    <p class="tagline">Provable HPC worlds — agentic simulation shell for scientific and game verticals.</p>
    <p class="url-placeholder">li-langverse.github.io/studio</p>
  </section>
</body>
</html>
