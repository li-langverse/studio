<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Li World Studio — command palette (marketing mock)</title>
  <link rel="stylesheet" href="studio-tokens.css" />
  <style>
    * { box-sizing: border-box; }
    body { width: 1920px; height: 1080px; margin: 0; background: var(--color-bg-primary); color: var(--color-text-primary); font-family: var(--typography-ui); overflow: hidden; }
    .mock-banner { position: absolute; top: 0; left: 0; right: 0; z-index: 100; background: #3d1f00; color: #ffdf9e; font-size: 11px; text-align: center; padding: 4px 8px; border-bottom: 1px solid var(--color-accent-amber); }
    .shell { position: absolute; inset: 24px 0 0 0; }
    .palette-panel { position: absolute; left: 50%; top: 28%; transform: translateX(-50%); width: 520px; background: var(--color-bg-elevated); border: 1px solid var(--color-accent-cyan); border-radius: 10px; z-index: 50; padding: 0; box-shadow: 0 16px 48px rgba(0,0,0,.55); }
    .palette-search { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--color-border); }
    .palette-search kbd { font-family: var(--typography-mono); padding: 4px 8px; border: 1px solid var(--color-border); color: var(--color-accent-cyan); }
    .palette-search input { flex: 1; border: none; background: transparent; color: var(--color-text-primary); font-size: 15px; }
    .palette-results { list-style: none; margin: 0; padding: 8px; }
    .palette-results li { padding: 10px 12px; border-radius: 6px; font-size: 14px; display: flex; justify-content: space-between; }
    .palette-results li.active { background: rgba(61,214,255,.12); color: var(--color-accent-cyan); }
    .hint { font-size: 11px; color: var(--color-text-muted); font-family: var(--typography-mono); }
    .palette-footer { padding: 8px 16px 12px; font-size: 11px; color: var(--color-text-muted); border-top: 1px solid var(--color-border); }
    .palette-backdrop { position: absolute; inset: 0; background: rgba(13,17,23,.55); z-index: 40; }
  </style>
</head>
<body>
  <div class="mock-banner">MARKETING MOCK — command palette open (⌘K)</div>
  <div class="shell">
    <div class="palette-backdrop"></div>
    <div class="palette-panel" role="dialog" aria-label="Command palette">
      <div class="palette-search"><kbd>⌘K</kbd><input type="search" value="focus" aria-label="Search commands" /></div>
      <ul class="palette-results">
        <li class="active"><span>Focus viewport</span><span class="hint">↵</span></li>
        <li><span>Run agent · optimize binding pose</span><span class="hint">agent</span></li>
        <li><span>Switch profile · Drug design</span><span class="hint">profile</span></li>
      </ul>
      <div class="palette-footer">3 commands · Esc to close · ↑↓ to navigate</div>
    </div>
  </div>
</body>
</html>
